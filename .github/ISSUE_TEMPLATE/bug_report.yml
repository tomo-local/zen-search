name: Bug Report
description: Report something that isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: Extension Version
      description: Find this in your browser's extension management page.
      placeholder: e.g. 1.6.0
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Other (please specify in additional context)
    validations:
      required: true

  - type: input
    id: browser_version
    attributes:
      label: Browser Version
      placeholder: e.g. 124.0.6367.82
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 14.4, Windows 11, Ubuntu 22.04
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: A clear, step-by-step description of how to reproduce the bug.
      placeholder: |
        1. Open the popup with Cmd+T
        2. Type "..."
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem (e.g. other extensions installed, special setup).
